# Application
spring.application.name=CommerceIQ
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:h2:mem:commerceiq_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true

# JWT Configuration
app.jwt.secret=CommerceIQ2024SecretKeyForJWTTokenGenerationMustBe256BitsLongAtLeast!!
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

# Logging
logging.level.com.commerceiq=INFO
logging.level.org.springframework.security=WARN
